name: crypto_shift_app
description: "Crypto Shift - 暗号資産ニュースアプリ"
publish_to: 'none'

version: 1.1.0+34

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  cached_network_image: ^3.3.1
  flutter_html: ^3.0.0-beta.2
  intl: ^0.19.0
  url_launcher: ^6.2.5
  share_plus: ^9.0.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.3
  web_socket_channel: ^3.0.3
  shimmer: ^3.0.0
  fl_chart: 0.69.0
  firebase_core: ^3.4.0
  firebase_messaging: ^15.1.0
  google_fonts: ^6.2.1
  marquee: ^2.2.3
  flutter_chat_ui: ^1.6.11
  flutter_chat_types: ^3.6.2
  uuid: ^4.5.3
  purchases_flutter: ^10.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app_logo.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/app_logo.png"
  android: true
  ios: false
 
dependency_overrides:
  web: ^1.1.1